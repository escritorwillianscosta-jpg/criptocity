<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cripto City - Metaverse Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffd700;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --info: #3b82f6;
            --farm: #10b981;
            --crop: #f59e0b;
            --grass: #14532d;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: var(--card-bg);
            padding: 0.8rem;
            display: flex;
            justify-content: space-around;
            border-bottom: 3px solid var(--primary);
            z-index: 10;
        }
        .coin-balance { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1.1rem; }
        .coin-balance i { color: var(--primary); }

        #game-container { 
            flex: 1; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto; 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
        }

        h1 { margin: 5px 0; color: var(--primary); text-transform: uppercase; font-size: 1.5rem; text-shadow: 2px 2px #000; }

        .map-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            width: 100%; 
            max-width: 500px; 
            background: rgba(0,0,0,0.3); 
            padding: 12px; 
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .plot { 
            aspect-ratio: 1; 
            background-color: var(--grass); 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-size: 0.55rem; 
            transition: all 0.2s; 
            border-bottom: 4px solid rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        
        .plot::before {
            content: '♣';
            position: absolute;
            bottom: 2px;
            left: 5px;
            color: rgba(255,255,255,0.1);
            font-size: 10px;
        }
        .plot::after {
            content: '♣';
            position: absolute;
            top: 5px;
            right: 5px;
            color: rgba(0,0,0,0.2);
            font-size: 8px;
        }

        .plot:hover { transform: scale(1.05); filter: brightness(1.2); }
        .plot.owned { background-color: #3f6212; border-color: var(--primary); }
        .plot.has-house { background-color: #1e3a8a; }
        .plot.has-cow { background-color: #064e3b; }
        .plot.crop-ready { animation: pulse 1s infinite; border: 2px solid #fff; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(255,255,255,0.7); }
            100% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
        }

        .plot i { font-size: 1.2rem; margin-bottom: 2px; text-shadow: 1px 1px #000; }
        .status-bar { width: 100%; max-width: 500px; margin: 8px 0; font-size: 0.8rem; display: flex; justify-content: space-between; color: #cbd5e1; font-weight: bold; }

        .btn-work { width: 100%; max-width: 500px; background: linear-gradient(to bottom, #ffd700, #b8860b); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; box-shadow: 0 4px #8b6508; transition: 0.1s; }
        .btn-work:active { transform: translateY(2px); box-shadow: 0 2px #8b6508; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 20px; border: 3px solid var(--primary); border-radius: 20px; z-index: 100; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 85%; max-width: 320px; }
        .modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .btn-action { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 0.9rem; }
        
        .seed-options { display: grid; grid-template-columns: 1fr; gap: 6px; margin-top: 8px; }
        .seed-btn { border: 1px solid var(--crop); background: rgba(0,0,0,0.3); color: #fff; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .seed-btn:hover { background: var(--crop); color: #000; }
    </style>
</head>
<body>
<header>
    <div class="coin-balance"><i class="fa-solid fa-coins"></i> <span id="city-coins">1000</span> CC</div>
    <div class="coin-balance"><i class="fa-solid fa-chart-line"></i> <span id="rent-val">0</span>/min</div>
</header>
<div id="game-container">
    <h1>Cripto City <small style="font-size: 0.6rem; vertical-align: middle;">BETA</small></h1>
    <div class="status-bar">
        <span><i class="fa-solid fa-location-crosshairs"></i> VILA GENESIS</span>
        <span id="owned-count">PROPRIEDADES: 0</span>
    </div>
    <div class="map-grid" id="map"></div>
    <button class="btn-work" onclick="work()">
        <i class="fa-solid fa-briefcase"></i> TRABALHAR (GANHAR 100 CC)
    </button>
</div>

<div id="modal">
    <h3 id="modal-title">Lote</h3>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
    <div id="modal-actions" class="modal-btns"></div>
    <button onclick="closeModal()" style="background: none; color: #94a3b8; border: none; margin-top: 15px; cursor: pointer; font-weight: bold;">[ FECHAR ]</button>
</div>

<script>
    let coins = 1000;
    let rentPerMinute = 0;
    let ownedPlots = 0;
    const map = document.getElementById('map');
    const modal = document.getElementById('modal');
    const modalActions = document.getElementById('modal-actions');
    let plotsData = {};

    const SEEDS = {
        alface: { name: 'Alface', price: 100, time: 10000, value: 250, icon: 'fa-leaf', color: '#4ade80' },
        milho: { name: 'Milho', price: 300, time: 30000, value: 850, icon: 'fa-wheat-awn', color: '#fbbf24' },
        tomate: { name: 'Tomate', price: 600, time: 60000, value: 1800, icon: 'fa-apple-whole', color: '#ef4444' }
    };

    for(let i=1; i<=50; i++) {
        plotsData[i] = { 
            owned: false, 
            hasHouse: false, 
            hasCow: false,
            cropType: null,
            cropStatus: 'none', 
            price: 500, 
            housePrice: 1500,
            cowPrice: 800
        };
        let plot = document.createElement('div');
        plot.className = 'plot';
        plot.id = 'plot-' + i;
        plot.innerHTML = `<i class="fa-solid fa-seedling" style="opacity: 0.3"></i><span style="opacity:0.6">${i}</span>`;
        plot.onclick = () => showPlotInfo(i);
        map.appendChild(plot);
    }

    setInterval(() => {
        if(rentPerMinute > 0) {
            coins += rentPerMinute / 60;
            document.getElementById('city-coins').innerText = Math.floor(coins);
        }
    }, 1000);

    function work() {
        coins += 100;
        document.getElementById('city-coins').innerText = Math.floor(coins);
        const btn = document.querySelector('.btn-work');
        btn.innerText = "TRABALHANDO...";
        btn.disabled = true;
        setTimeout(() => {
            btn.innerHTML = '<i class="fa-solid fa-briefcase"></i> TRABALHAR (GANHAR 100 CC)';
            btn.disabled = false;
        }, 2000);
    }

    function showPlotInfo(id) {
        const data = plotsData[id];
        modal.style.display = 'block';
        document.getElementById('modal-title').innerText = "Terreno #" + id;
        
        let html = '';
        if(!data.owned) {
            html = `<button onclick="buyPlot(${id})" class="btn-action" style="background: var(--success)">COMPRAR LOTE (500 CC)</button>`;
        } else {
            if(!data.hasHouse) {
                html += `<button onclick="buildHouse(${id})" class="btn-action" style="background: var(--info)">🏠 CONSTRUIR CASA (1500 CC)</button>`;
            }
            if(!data.hasCow) {
                html += `<button onclick="buyCow(${id})" class="btn-action" style="background: var(--farm)">🐄 COMPRAR GADO (800 CC)</button>`;
            }
            
            if(data.cropStatus === 'none') {
                html += `<div class="seed-options">
                    <button onclick="plantCrop(${id}, 'alface')" class="seed-btn"><span>🥬 Alface</span> <b>100 CC</b></button>
                    <button onclick="plantCrop(${id}, 'milho')" class="seed-btn"><span>🌽 Milho</span> <b>300 CC</b></button>
                    <button onclick="plantCrop(${id}, 'tomate')" class="seed-btn"><span>🍅 Tomate</span> <b>600 CC</b></button>
                </div>`;
            } else if(data.cropStatus === 'ready') {
                const seed = SEEDS[data.cropType];
                html += `<button onclick="harvestCrop(\({id})" class="btn-action" style="background: #ea580c">💰 COLHER \){seed.name.toUpperCase()} (+${seed.value} CC)</button>`;
            } else {
                html += `<p style="color: var(--crop); font-weight: bold; margin-top: 10px;">⏳ CRESCENDO...</p>`;
            }
        }
        modalActions.innerHTML = html;
    }

    function closeModal() { modal.style.display = 'none'; }

    function buyPlot(id) {
        if(coins >= plotsData[id].price) {
            coins -= plotsData[id].price;
            plotsData[id].owned = true;
            ownedPlots++;
            updateUI(id);
            closeModal();
        } else { alert("Saldo insuficiente!"); }
    }

    function buyCow(id) {
        if(coins >= plotsData[id].cowPrice) {
            coins -= plotsData[id].cowPrice;
            plotsData[id].hasCow = true;
            rentPerMinute += 5;
            updateUI(id);
            closeModal();
        } else { alert("Saldo insuficiente!"); }
    }

    function buildHouse(id) {
        if(coins >= plotsData[id].housePrice) {
            coins -= plotsData[id].housePrice;
            plotsData[id].hasHouse = true;
            rentPerMinute += 10;
            updateUI(id);
            closeModal();
        } else { alert("Saldo insuficiente!"); }
    }

    function plantCrop(id, type) {
        const seed = SEEDS[type];
        if(coins >= seed.price) {
            coins -= seed.price;
            plotsData[id].cropStatus = 'growing';
            plotsData[id].cropType = type;
            updateUI(id);
            closeModal();
            setTimeout(() => {
                plotsData[id].cropStatus = 'ready';
                updateUI(id);
            }, seed.time);
        } else { alert("Saldo insuficiente!"); }
    }

    function harvestCrop(id) {
        const seed = SEEDS[plotsData[id].cropType];
        coins += seed.value;
        plotsData[id].cropStatus = 'none';
        plotsData[id].cropType = null;
        updateUI(id);
        closeModal();
    }

    function updateUI(id) {
        document.getElementById('city-coins').innerText = Math.floor(coins);
        document.getElementById('rent-val').innerText = rentPerMinute;
        document.getElementById('owned-count').innerText = "PROPRIEDADES: " + ownedPlots;
        const plotEl = document.getElementById('plot-' + id);
        let icons = '';
        if(plotsData[id].hasHouse) icons += `<i class="fa-solid fa-house-chimney"></i>`;
        if(plotsData[id].hasCow) icons += `<i class="fa-solid fa-cow"></i>`;
        if(plotsData[id].cropStatus === 'growing') icons += `<i class="fa-solid fa-clock" style="color: rgba(255,255,255,0.5)"></i>`;
        if(plotsData[id].cropStatus === 'ready') {
            const seed = SEEDS[plotsData[id].cropType];
            icons += `<i class="fa-solid \({seed.icon}" style="color: \){seed.color}"></i>`;
        }
        if(!plotsData[id].hasHouse && !plotsData[id].hasCow && plotsData[id].cropStatus === 'none') {
            icons = `<i class="fa-solid fa-mountain-sun" style="opacity: 0.2"></i>`;
        }
        plotEl.className = 'plot';
        if(plotsData[id].owned) plotEl.classList.add('owned');
        if(plotsData[id].hasHouse) plotEl.classList.add('has-house');
        if(plotsData[id].hasCow) plotEl.classList.add('has-cow');
        if(plotsData[id].cropStatus === 'ready') plotEl.classList.add('crop-ready');
        let label = id;
        if(plotsData[id].cropStatus === 'ready') label = 'COLHER!';
        else if(plotsData[id].cropStatus === 'growing') label = '...';
        else if(plotsData[id].hasHouse && plotsData[id].hasCow) label = '🏠🐄';
        else if(plotsData[id].hasHouse) label = '🏠';
        else if(plotsData[id].hasCow) label = '🐄';
        plotEl.innerHTML = icons + `<span style="font-weight:bold">${label}</span>`;
    }
</script>
</body>
</html>
